<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { background: radial-gradient(1200px 600px at 20% -10%, rgba(99,102,241,.18), transparent 55%),
                            radial-gradient(900px 500px at 80% 0%, rgba(56,189,248,.12), transparent 55%),
                            #0b1220; }
        .app-shell { max-width: 1100px; }
        .card {
            border: 1px solid rgba(255,255,255,.14);
            background: rgba(255,255,255,.07);
            color: #f8fafc;
            box-shadow: 0 14px 40px rgba(0,0,0,.28);
        }
        .muted { color: rgba(248,250,252,.82); }
        /* Ensure Bootstrap table doesn't turn white inside dark cards */
        .table {
            color: #f8fafc;
            --bs-table-bg: transparent;
            --bs-table-color: #f8fafc;
            --bs-table-border-color: rgba(255,255,255,.12);
        }
        .table>:not(caption)>*>* { background-color: transparent !important; }
        .table thead th {
            color: rgba(248,250,252,.92);
            border-color: rgba(255,255,255,.16);
            font-weight: 600;
            letter-spacing: .02em;
        }
        .table td, .table th { border-color: rgba(255,255,255,.12); }
        .table tbody tr:hover { background: rgba(255,255,255,.06); }
        .form-control, .form-select {
            background: rgba(255,255,255,.10);
            border-color: rgba(255,255,255,.16);
            color: #f8fafc;
        }
        .form-control::placeholder { color: rgba(248,250,252,.62); }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 .18rem rgba(99,102,241,.22);
            border-color: rgba(99,102,241,.85);
        }
        /* Fix: native <select> dropdown uses light menu; force readable option colors */
        select.form-select option { color: #0b1220; background: #ffffff; }
        select.form-select option:checked { background: #e5e7eb; }
        .btn-primary { background: #6366f1; border-color: #6366f1; font-weight: 600; }
        .btn-primary:hover { background: #4f46e5; border-color: #4f46e5; }
        .btn-outline-light { border-color: rgba(255,255,255,.30); color: rgba(248,250,252,.95); }
        .btn-outline-light:hover { background: rgba(255,255,255,.10); }
        /* High-contrast category pill (readable on light/dark) */
        .badge-soft { background: rgba(99,102,241,.92); color: #ffffff; border: 1px solid rgba(255,255,255,.20); }
        .badge { font-weight: 600; }
        .toast-container { z-index: 1080; }
        .clickable-row { cursor: pointer; }
    </style>
</head>
<body>
<div class="container py-4 app-shell">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h1 class="h3 mb-0 text-white">Expense Tracker</h1>
            <div class="muted small">Add, edit, delete expenses and see quick reports.</div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-light" id="refreshBtn" type="button">Refresh</button>
            <button class="btn btn-primary" id="addBtn" type="button">Add expense</button>
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-12 col-lg-4">
            <div class="card p-3 h-100">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="muted small">Total expenses</div>
                        <div class="fs-4 fw-semibold" id="totalExpenses">—</div>
                    </div>
                    <span class="badge badge-soft">Report</span>
                </div>
                <div class="muted small mt-2">Category + month breakdown below.</div>
            </div>
        </div>
        <div class="col-12 col-lg-4">
            <div class="card p-3 h-100">
                <div class="muted small mb-2">Category-wise</div>
                <div id="categoryReport" class="small">—</div>
            </div>
        </div>
        <div class="col-12 col-lg-4">
            <div class="card p-3 h-100">
                <div class="muted small mb-2">Monthly summary</div>
                <div id="monthlyReport" class="small">—</div>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-2">
            <div class="muted small">
                Tip: click a row to edit quickly.
            </div>
            <div class="d-flex gap-2">
                <input class="form-control form-control-sm" style="width: 230px" id="searchBox" placeholder="Search description/category…"/>
                <select class="form-select form-select-sm" style="width: 180px" id="categoryFilter">
                    <option value="">All categories</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
                <thead>
                <tr>
                    <th style="width: 90px;">ID</th>
                    <th style="width: 140px;">Date</th>
                    <th style="width: 160px;">Category</th>
                    <th>Description</th>
                    <th class="text-end" style="width: 140px;">Amount</th>
                    <th class="text-end" style="width: 160px;">Actions</th>
                </tr>
                </thead>
                <tbody id="expensesTbody">
                <tr><td colspan="6" class="muted">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="expenseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="background:#0f172a; color:#eef2ff; border: 1px solid rgba(255,255,255,.10);">
            <div class="modal-header" style="border-color: rgba(255,255,255,.10);">
                <h5 class="modal-title" id="modalTitle">Add expense</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="expenseForm">
                    <input type="hidden" id="expenseId"/>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label muted small">Amount</label>
                            <input type="number" min="0.01" step="0.01" class="form-control" id="amount" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label muted small">Date</label>
                            <input type="date" class="form-control" id="date" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label muted small">Category</label>
                            <select class="form-select" id="category" required></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label muted small">Description</label>
                            <input type="text" class="form-control" id="description" maxlength="500" required/>
                        </div>
                    </div>
                </form>
                <div class="small text-danger mt-2" id="formError" style="display:none;"></div>
            </div>
            <div class="modal-footer" style="border-color: rgba(255,255,255,.10);">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastBody">Done</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script src="/app.js"></script>
</body>
</html>
